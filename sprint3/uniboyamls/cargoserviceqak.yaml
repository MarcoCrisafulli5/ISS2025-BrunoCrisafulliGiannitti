services:
 
  cargoserviceqak:
    container_name: cargoserviceqak 
    #image: cargoserviceqak:1.0
    image: docker.io/natbodocker/cargoserviceqak:1.0
    environment:
      - MONGO_HOST=mongodb
      - SERVICE_IP=10.152.235.74
    ports:
      - 8111:8111/tcp
      - 8111:8111/udp
    depends_on:
      - eureka
    networks:
      - iss-network

  cargoholdservice:
    container_name: cargoholdservice
    # image: cargoholdservice_sa:1.0
    image: cargoholdservice_local:latest
    #image: cargoholdservice:1.0
    environment: #needed for _local image, not needed for sa image
      - SERVICE_IP=10.152.235.74 #specify address else docker ip address is published on eureka
    ports:
      - 8888:8888/tcp
      - 8095:8095/tcp
      - 8096:8096/tcp
      - 5683:5683/udp
    depends_on:
      - cargoserviceqak
      - eureka
    networks:
      - iss-network

  basicrobot24:
    container_name: basicrobot24
    image: basicrobot:3.0
    #image : docker.io/natbodocker/basicrobot24:3.0
    mem_limit: 512m
    volumes:
      - ./basicrobotConfig.json:/basicrobot24-1.0/bin/basicrobotConfig.json
      - ./stepTimeConfig.json:/basicrobot24-1.0/bin/stepTimeConfig.json
    ports:
      - "8020:8020/tcp"
      - "8020:8020/udp"
      - "8085:8085"
    environment:
      - VIRTUAL_ENV=wenv                         #Used by uniborobots.robotSupport.create
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka:8761/eureka/
      - SERVICE_HOST=10.152.235.74     #basicrobot24 per app che usano basicrobot in docker
      - SERVICE_IP=10.152.235.74
      - MQTTBROKER=mosquitto
    depends_on:
      - wenv
      - eureka
    networks:
      - iss-network
  wenv:
    container_name: wenv
    image: docker.io/natbodocker/virtualrobotdisi25:2.2
    #image: virtualrobotdisi25:2.1
    ports:
      - 8090:8090 
      - 8091:8091/tcp
      - 8091:8091/udp
    networks:
      - iss-network

  usermock:
    container_name: usermock
    image: usermock:2.0
    environment:
      - EUREKA_INSTANCE_HOSTNAME=usermock
    ports:
      - 8887:8887/tcp
      - 8887:8887/udp
    depends_on:
      - cargoholdservice
      - eureka
    networks:
      - iss-network

  mosquitto:
    image: eclipse-mosquitto:1.6.15
    container_name: mosquitto
    volumes:
      - ./mqtt.conf:/mosquitto/config/mosquitto.conf
    ports:
      - 1883:1883
      - 9001:9001                   # Optional:Utilizzata per WebSocket MQTT
    networks:
      - iss-network

  mongodb:
    image: mongo:6.0.4
    container_name: mongodb  
    mem_limit: 512m
    environment:
      - MONGO_INITDB_DATABASE=cargodb # Nome del database da inizializzare
    ports:
      - "27017:27017"
    command: mongod
    networks:
      - iss-network

 
  eureka:
    image: 'natbodocker/springcloud-eureka'                                     
    container_name: eurekaserver 
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false       # Il server Eureka non si registra da solo
      - EUREKA_CLIENT_FETCH_REGISTRY=false             # Il server Eureka non recupera il registro
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false   # Disabilita la modalità di auto-conservazione per testare l'auto-rimozione delle istanze
      - EUREKA_INSTANCE_LEASE_RENEWAL_INTERVAL_IN_SECONDS=60
      - EUREKA_INSTANCE_LEASE_EXPIRATION_DURATION_IN_SECONDS=120
    networks:
      - iss-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
    iss-network:
       external: true

